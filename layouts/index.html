{{ define "main" }}
<section>
  <h2>最新文章</h2>
  <ul class="post-list">
    {{ range .Site.RegularPages.ByDate.Reverse }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <span class="date">{{ .Date.Format "2006-01-02" }}</span>
      </li>
    {{ else }}
      <li>还没有文章，先发布第一篇吧。</li>
    {{ end }}
  </ul>
</section>
{{ end }}
